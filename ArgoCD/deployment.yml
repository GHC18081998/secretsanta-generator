apiVersion: apps/v1
kind: Deployment
metadata:
  name: secretsanta-generator-app
  labels:
    app: secretsanta-generator-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secretsanta-generator-app
  template:
    metadata:
      labels:
        app: secretsanta-generator-app
    spec:
      containers:
      - name: secretsanta-generator-app
        image: ghc18081998/secretsanta-generator:10
        ports:
        - containerPort: 3000
